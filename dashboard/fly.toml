app = "public-charity-dashboard"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "dashboard_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[http_service.checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/"

[env]
  AUTH_URL = "http://public-charity-auth.internal:8080"
  DATABASE_PATH = "/data/dashboard.db"
