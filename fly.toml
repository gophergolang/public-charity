app = "public-charity"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.gateway"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[http_service.checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "5s"
  method = "GET"
  path = "/health"

[env]
  GATEWAY_URL = "http://localhost:8080"
  AGENT_INTERVAL = "5m"
