<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Username}} — public.charity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; line-height: 1.6; max-width: 640px; margin: 0 auto; padding: 24px 16px; }
        h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .bio { color: #555; margin-bottom: 24px; }
        .section { margin-bottom: 24px; }
        .section h2 { font-size: 1rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .score { display: flex; justify-content: space-between; padding: 6px 10px; background: #fff; border-radius: 6px; border: 1px solid #eee; }
        .score-label { font-size: 0.85rem; }
        .score-bar { width: 60px; height: 8px; background: #eee; border-radius: 4px; margin-top: 6px; overflow: hidden; }
        .score-fill { height: 100%; background: #2563eb; border-radius: 4px; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: #e0e7ff; color: #3730a3; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; }
        .item { background: #fff; border: 1px solid #eee; border-radius: 6px; padding: 10px; margin-bottom: 6px; }
        .item .cat { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .badge { display: inline-block; background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
        footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #eee; font-size: 0.8rem; color: #aaa; text-align: center; }
        footer a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    {{template "content" .}}
    <footer>
        <a href="https://public.charity">public.charity</a> — welfare-first neighborhood infrastructure
    </footer>
</body>
</html>
